name: MeetingMind CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: meetingmind
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: meetingmind_test
        ports: ["5432:5432"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://meetingmind:secret@localhost:5432/meetingmind_test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build ./backend -t meetingmind-backend:${{ github.sha }}
      - name: Build frontend image
        run: docker build ./frontend -t meetingmind-frontend:${{ github.sha }}
